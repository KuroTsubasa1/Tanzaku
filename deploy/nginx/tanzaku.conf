# nginx site config for tanzaku.lasseharm.space
# Install: symlink into /etc/nginx/sites-enabled/ then `nginx -t && systemctl reload nginx`
# Certs are issued/renewed by certbot (see deploy/README.md).

# --- HTTP: serve ACME challenges, redirect everything else to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name tanzaku.lasseharm.space;

    # Let's Encrypt webroot renewals.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: serve the built SPA ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name tanzaku.lasseharm.space;

    root /opt/tanzaku/dist;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/tanzaku.lasseharm.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tanzaku.lasseharm.space/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed build assets — safe to cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: react-router handles client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must never be cached, so new deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
